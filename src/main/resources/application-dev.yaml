server:
  port: 8081

spring:
  datasource:
    url: "jdbc:mysql://jsomysql.duckdns.org:32768/DLS_DEV"
    username: root
    password: ${DB_PASSWORD}
    hikari:
      minimum-idle: 5
      idle-timeout: 600000        # 10 min
      max-lifetime: 1800000       # 30 min
      connection-timeout: 30000   # 30s

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        "[format_sql]": true

seaweedfs:
  master:
    url: https://master-seaweed.hikarimoon.pro
  filer:
    url: https://filer-seaweed.hikarimoon.pro