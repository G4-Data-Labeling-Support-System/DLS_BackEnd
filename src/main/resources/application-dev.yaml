server:
  port: 8081

spring:
  datasource:
    url: "jdbc:mysql://jsomysql.duckdns.org:32768/DLS-DEV"
    username: root
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        "[format_sql]": true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB